{% extends 'players/base.html' %}

{% block content %}
<div class="top-row">
    <div>
        <h2 class="section-title">Player Form</h2>
        <div class="section-subtitle">Add or update athlete information.</div>
    </div>
</div>

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Save Player</button>
</form>

<a href="{% url 'player_list' %}" class="back-link">← Back to player directory</a>
{% endblock %}
