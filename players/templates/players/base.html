<!DOCTYPE html>
<html>
<head>
    <title>VolleyHub</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(180deg, #f8fafc 0%, #eef2f7 100%);
            color: #1f2937;
        }

        .navbar {
            background: #0f172a;
            color: white;
            padding: 22px 48px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.12);
        }

        .brand-wrap {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .brand-icon {
            width: 44px;
            height: 44px;
            border: 2px solid rgba(255,255,255,0.7);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            background: rgba(255,255,255,0.06);
        }

        .brand {
            font-size: 30px;
            font-weight: 700;
            letter-spacing: 0.4px;
        }

        .brand-sub {
            font-size: 13px;
            color: #cbd5e1;
            margin-top: 4px;
        }

        .hero {
            width: 90%;
            max-width: 1180px;
            margin: 34px auto 20px auto;
            background: linear-gradient(135deg, rgba(15,23,42,0.96), rgba(30,41,59,0.92));
            border-radius: 24px;
            padding: 34px 38px;
            color: white;
            box-shadow: 0 14px 40px rgba(15, 23, 42, 0.12);
            position: relative;
            overflow: hidden;
        }

        .hero::after {
            content: "◌";
            position: absolute;
            right: 30px;
            top: 0px;
            font-size: 180px;
            color: rgba(255,255,255,0.05);
            line-height: 1;
        }

        .hero h1 {
            margin: 0 0 10px 0;
            font-size: 38px;
            font-weight: 700;
            color: white;
        }

        .hero p {
            margin: 0;
            font-size: 15px;
            color: #cbd5e1;
            max-width: 680px;
            line-height: 1.6;
        }

        .container {
            width: 90%;
            max-width: 1180px;
            margin: 0 auto 40px auto;
        }

        .panel {
            background: rgba(255,255,255,0.92);
            border: 1px solid #e5e7eb;
            border-radius: 22px;
            padding: 28px;
            box-shadow: 0 10px 28px rgba(15, 23, 42, 0.06);
        }

        .top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 22px;
        }

        .section-title {
            margin: 0;
            font-size: 26px;
            color: #0f172a;
            font-weight: 700;
        }

        .section-subtitle {
            margin-top: 6px;
            color: #6b7280;
            font-size: 14px;
        }

        .btn {
            display: inline-block;
            border: none;
            border-radius: 12px;
            padding: 12px 18px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .btn-primary {
            background: #0f172a;
            color: white;
        }

        .btn-edit {
            background: #e2e8f0;
            color: #0f172a;
        }

        .btn-delete {
            background: #fee2e2;
            color: #b91c1c;
        }

        .btn-cancel {
            background: #e5e7eb;
            color: #374151;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            overflow: hidden;
            border-radius: 18px;
            background: white;
        }

        thead th {
            text-align: left;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: #64748b;
            background: #f8fafc;
            padding: 18px 16px;
            border-bottom: 1px solid #e5e7eb;
        }

        tbody td {
            padding: 20px 16px;
            border-bottom: 1px solid #edf2f7;
            vertical-align: middle;
            font-size: 15px;
            color: #111827;
        }

        tbody tr:hover {
            background: #fafafa;
        }

        .actions-inline {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .empty-message {
            text-align: center;
            padding: 36px;
            color: #6b7280;
            font-style: italic;
        }

        .search-form {
            display: flex;
            gap: 12px;
            margin-bottom: 22px;
            flex-wrap: wrap;
        }

        .search-form input {
            flex: 1;
            min-width: 240px;
        }

        form {
            margin-top: 8px;
        }

        form p {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #111827;
        }

        input, select, textarea {
            width: 100%;
            padding: 14px 14px;
            border: 1px solid #d1d5db;
            border-radius: 14px;
            background: #f9fafb;
            font-size: 15px;
            transition: 0.2s ease;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #94a3b8;
            background: white;
            box-shadow: 0 0 0 4px rgba(15, 23, 42, 0.05);
        }

        button {
            border: none;
            border-radius: 12px;
            padding: 13px 18px;
            background: #0f172a;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .back-link {
            display: inline-block;
            margin-top: 16px;
            color: #475569;
            text-decoration: none;
            font-weight: 600;
        }

        .confirm-box {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 18px;
            padding: 24px;
        }

        .confirm-box p {
            font-size: 16px;
            color: #374151;
            margin-bottom: 20px;
        }

        .footer-note {
            margin-top: 18px;
            color: #94a3b8;
            font-size: 13px;
        }

       

        @media (max-width: 900px) {
            .hero h1 {
                font-size: 30px;
            }

            table {
                display: block;
                overflow-x: auto;
            }

            .navbar {
                padding: 18px 22px;
            }

            .hero, .container {
                width: 94%;
            }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="brand-wrap">
            <div class="brand-icon">🏐</div>
            <div>
                <div class="brand">VolleyHub</div>
                <div class="brand-sub">Elite Club Roster</div>
            </div>
        </div>
    </div>

    <div class="hero">
        <h1>Precision. Teamwork. Performance.</h1>
        <p>Manage your volleyball roster with a clean, premium workspace built for clubs, coaches, and player operations.</p>
    </div>

    <div class="container">
        <div class="panel">
            {% block content %}
            {% endblock %}
        </div>
    </div>
</body>
</html>
